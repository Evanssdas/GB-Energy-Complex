name: Daily energy complex

on:
  schedule:
    - cron: "0 22 * * 1-5"     # weekday evenings, after US settlement
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  complex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python energy_complex.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add energy_complex_log.csv COMPLEX.md
          git commit -m "energy complex $(date -u +%Y-%m-%d)" || echo "nothing to commit"
          git pull --rebase origin main || true
          git push origin main
